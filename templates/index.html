<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#11131a">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/engine.css">
  <title>InkBloom 漫画上色</title>
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand"><span class="mark">I</span><div><h1>InkBloom</h1><p>本地 · 免费 · 漫画批量上色</p></div></div>
      <span class="badge">PORTABLE</span>
    </header>

    <section class="hero">
      <div><span class="eyebrow">REFERENCE-AWARE COLOR</span><h2>让黑白漫画，<em>长出颜色。</em></h2>
      <p>导入图片、PDF、CBZ 或 ZIP；用多张人物、服装和场景样例约束整部漫画的颜色。所有文件只在你的电脑上处理。</p></div>
      <div class="privacy"><strong>100%</strong><span>LOCAL<br>PROCESSING</span></div>
    </section>

    <form id="job-form" class="workspace">
      <section class="card upload-card">
        <div class="step">01</div><h3>导入漫画</h3>
        <label class="dropzone" id="dropzone">
          <input id="files" name="files" type="file" multiple accept="image/*,.pdf,.cbz,.zip" required>
          <span class="upload-icon">↥</span><strong>拖入漫画文件</strong><small>图片 / PDF / CBZ / ZIP，可多选</small>
          <span class="file-state" id="file-state">选择文件</span>
        </label>
      </section>

      <section class="card reference-card">
        <div class="step">02</div><h3>样例与风格</h3>
        <div class="engine-switch">
          <label><input type="radio" name="engine" value="manganinja" checked><span><strong>人物精细</strong><small>MangaNinja · 皮肤/服装</small></span></label>
          <label><input type="radio" name="engine" value="ai"><span><strong>AI 平衡</strong><small>CPU · 快速整页</small></span></label>
          <label><input type="radio" name="engine" value="fast"><span><strong>极速模式</strong><small>超快 CPU 配色</small></span></label>
        </div>
        <label class="reference">
          <input id="references" name="references" type="file" accept="image/*" multiple>
          <span id="ref-state"><strong>＋ 添加多张彩色样例</strong><small>人物、服装、场景越完整越准确</small></span>
        </label>
        <label>样例约束 <output id="ref-out">90%</output><input name="reference_strength" type="range" min="0.5" max="1" step="0.01" value="0.90"></label>
        <label>饱和度 <output id="sat-out">105%</output><input name="saturation" type="range" min="0.5" max="1.4" step="0.01" value="1.05"></label>
        <label>上色强度 <output id="str-out">95%</output><input name="strength" type="range" min="0.5" max="1" step="0.01" value="0.95"></label>
        <label>线稿保护 <output id="line-out">82%</output><input name="line_protection" type="range" min="0.4" max="1" step="0.01" value="0.82"></label>
      </section>

      <section class="card action-card">
        <div class="step">03</div><h3>开始上色</h3>
        <label class="title-label">作品名称<input name="title" placeholder="默认使用文件名"></label>
        <button type="submit" id="start">开始批量上色 <span>→</span></button>
        <p class="hint">人物精细模式需 NVIDIA 6GB+ · 仅限非商业使用</p>
      </section>
    </form>

    <section id="progress-panel" class="progress-panel hidden">
      <div class="progress-head"><div><span class="eyebrow">PROCESSING</span><h3 id="progress-message">准备中</h3></div><strong id="progress-number">0%</strong></div>
      <div class="bar"><i id="progress-bar"></i></div>
      <div id="previews" class="previews"></div>
      <div id="downloads" class="downloads"></div>
    </section>

    <footer><span>手机同一 Wi-Fi 可访问：<b>{{ lan_url }}</b></span><span>文件保存在程序目录的 output 文件夹</span></footer>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
